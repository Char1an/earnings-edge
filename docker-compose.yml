services:
  postgres:
    image: postgres:15
    container_name: earnings_edge_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-earnings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-earnings}
      POSTGRES_DB: ${POSTGRES_DB:-earnings_edge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-earnings} -d ${POSTGRES_DB:-earnings_edge}"]
      interval: 5s
      timeout: 5s
      retries: 10
